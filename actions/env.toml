[[action]]
name = "env"
[action.config]
file_contents = """
// Komodo Action: zapis-datum
// Zapíše aktuální datum a čas do souboru /tmp/komodo-datum.log na serveru

const SERVER = "alfa"; // <-- změň na název svého serveru v Komodo
const SOUBOR = "/tmp/komodo-datum.log";

const stacks = await komodo.read("ListStacks", {});
console.log(stacks);

console.log(`Připojuji se na server: ${SERVER}`);

const radky: string[] = [];

await komodo.execute_server_terminal(
  {
    server: SERVER,
    terminal: "zapis-datum-session",
    command: `echo "$(date '+%Y-%m-%d %H:%M:%S') - Komodo action spuštěna" >> ${SOUBOR} && echo "Hotovo. Obsah souboru:" && cat ${SOUBOR}`,
    init: {
      command: "bash",
      recreate: "DifferentCommand",
    },
  },
  {
    onLine: (line) => {
      radky.push(line);
      console.log(line);
    },
    onFinish: (exitCode) => {
      console.log(`\nPříkaz skončil s kódem: ${exitCode}`);
      if (exitCode === 0) {
        console.log("✅ Datum úspěšně zapsáno!");
      } else {
        console.error("❌ Chyba při zápisu.");
      }
    },
  }
);
"""